name: Build OnePlus 11R Kernel with NetHunter

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build OnePlus 11R Kernel
        uses: Fyg369/Kernel-Action@main
        with:
          # OnePlus 11R-ի kernel-ի աղբյուր (SM8475 / waipio)
          kernel-url: https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475
          kernel-branch: oneplus/sm8475_b_16.0.0_oneplus_11r
          kernel-dir: kernel_platform/msm-kernel
          
          # Vendor աղբյուր (OnePlus-ի համար անհրաժեշտ է)
          vendor: true
          vendor-url: https://github.com/OnePlusOSS/android_vendor_oneplus_sm8475
          vendor-branch: oneplus/sm8475_b_16.0.0_oneplus_11r
          vendor-dir: vendor
          
          # Կոնֆիգուրացիա OnePlus 11R-ի համար
          config: vendor/oneplus11r_defconfig
          arch: arm64
          
          # Android տարբերակ (15 = OxygenOS 16)
          android-version: 16
          
          # KernelSU Next
          ksu: true
          ksu-version: main
          
          # NetHunter (monitor mode, packet injection)
          nethunter: true
          nethunter-patch: true
          
          # LXC/Docker աջակցություն
          lxc: true
          lxc-patch: true
          
          # Փաթեթավորում AnyKernel3-ով
          anykernel3: true
          
          # Ավտոմատ թողարկում
          release: true
