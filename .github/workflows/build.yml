name: Build OnePlus 11R Kernel with NetHunter

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build OnePlus 11R Kernel
        uses: Fyg369/Kernel-Action@main
        with:
          # OnePlus 11R-ի kernel-ի աղբյուրի կոդը (SM8475 / waipio)
          kernel-url: https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475
          kernel-branch: oneplus/sm8475_s_16.0.0_oneplus11r
          kernel-dir: kernel_platform/msm-kernel
          
          # Vendor kernel աղբյուրը (OnePlus-ի համար անհրաժեշտ է)
          vendor: true
          vendor-url: https://github.com/OnePlusOSS/android_vendor_oneplus_sm8475
          vendor-branch: oneplus/sm8475_s_16.0.0_oneplus11r
          vendor-dir: vendor
          
          # Կոնֆիգուրացիա OnePlus 11R-ի համար
          config: vendor/oneplus11r_defconfig
          arch: arm64
          
          # Android տարբերակը (15 = OxygenOS 16-ի համար)
          android-version: 15
          
          # Միացնել KernelSU Next-ը
          ksu: true
          ksu-version: main
          
          # Միացնել NetHunter-ը
          nethunter: true
          nethunter-patch: true
          
          # Միացնել LXC/Docker աջակցությունը
          lxc: true
          lxc-patch: true
          
          # Միացնել SUSFS-ը (root hiding)
          susfs: true
          
          # Փաթեթավորում AnyKernel3-ով
          anykernel3: true
          
          # Ավտոմատ թողարկում
          release: true
